steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Installation Node.js 20'

  - script: npm ci
    displayName: 'Installation des dependances (npm ci)'

  - script: npm run build
    displayName: 'Build Vue.js'
    env:
      VITE_BUILD_ID: $(Build.SourceVersion)

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'dist'
      ArtifactName: 'front-dist'
    displayName: 'Publication artefact front-dist'